<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coolbrick × Claude — Work Board</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--cream:#f5f0e8;--paper:#ede8de;--brick:#c0432a;--navy:#1a2640;--charcoal:#2c2c2c;--ash:#6b6b6b;--mist:#b8b2a8;--card-bg:#faf7f2;--done-col:#2a5c45;--prog-col:#c0432a;--todo-col:#1a2640;--blocked-col:#7a5c1e}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--cream);color:var(--charcoal);font-family:'Outfit',sans-serif;min-height:100vh}
body::after{content:'';position:fixed;inset:0;pointer-events:none;opacity:.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");z-index:9999}
.back-link{position:absolute;top:12px;left:16px;font-family:'Space Mono',monospace;font-size:.7rem;color:var(--mist);text-decoration:none;z-index:10;letter-spacing:.04em}
.back-link:hover{color:#fff}
.masthead{background:var(--navy);padding:2.5rem 2rem 2rem;color:#fff;position:relative}
.masthead-inner{max-width:1400px;margin:0 auto;display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:1rem}
.masthead h1{font-family:'Playfair Display',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:900;letter-spacing:-.5px;line-height:1}
.masthead h1 span{color:#6ec6a0}
.masthead-sub{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--mist);margin-top:.4rem;letter-spacing:.05em;text-transform:uppercase}
.scoreboard{display:flex;gap:1.5rem;flex-wrap:wrap}
.score-item{text-align:center}
.score-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;line-height:1}
.score-num.done{color:#6ec6a0}.score-num.prog{color:#f0826a}.score-num.todo{color:#8fa8c8}.score-num.blocked{color:#d4a843}
.score-label{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--mist);text-transform:uppercase;letter-spacing:.08em}
.progress-strip{height:6px;display:flex;max-width:1400px;margin:0 auto}
.progress-strip div{transition:width .4s}
.ps-done{background:var(--done-col)}.ps-prog{background:var(--prog-col)}.ps-todo{background:var(--todo-col)}.ps-blocked{background:var(--blocked-col)}
.filters{background:var(--paper);padding:1rem 2rem;display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;justify-content:center}
.fbtn{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;padding:.4rem .8rem;border-radius:3px;border:1px solid var(--mist);background:transparent;color:var(--ash);cursor:pointer;transition:all .15s}
.fbtn:hover{border-color:var(--charcoal);color:var(--charcoal)}
.fbtn.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.board{max-width:1400px;margin:2rem auto;padding:0 1.5rem;display:grid;grid-template-columns:repeat(4,1fr);gap:1.5rem}
@media(max-width:1100px){.board{grid-template-columns:repeat(2,1fr)}}
@media(max-width:640px){.board{grid-template-columns:1fr}}
.column{position:relative;min-height:200px}
.col-head{display:flex;align-items:center;gap:.6rem;padding-bottom:.6rem;margin-bottom:1rem}
.col-head.done{border-bottom:3px solid var(--done-col)}.col-head.progress{border-bottom:3px solid var(--prog-col)}.col-head.todo{border-bottom:3px solid var(--todo-col)}.col-head.blocked{border-bottom:3px solid var(--blocked-col)}
.col-title{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700}
.col-count{font-family:'Space Mono',monospace;font-size:.65rem;padding:.2rem .5rem;border-radius:3px;color:#fff}
.col-count.done{background:var(--done-col)}.col-count.progress{background:var(--prog-col)}.col-count.todo{background:var(--todo-col)}.col-count.blocked{background:var(--blocked-col)}
.col-ghost{position:absolute;top:3rem;left:0;font-family:'Playfair Display',serif;font-size:4rem;font-weight:900;color:var(--charcoal);opacity:.03;pointer-events:none;white-space:nowrap;text-transform:uppercase}
.card{background:var(--card-bg);border-radius:6px;padding:.9rem 1rem;margin-bottom:.75rem;border-left:4px solid var(--mist);transition:transform .15s,box-shadow .15s;cursor:default;animation:slideIn .3s ease both}
.card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.card.done{border-left-color:var(--done-col)}.card.progress{border-left-color:var(--prog-col)}.card.todo{border-left-color:var(--todo-col)}.card.blocked{border-left-color:var(--blocked-col)}
.card-tag{font-family:'Space Mono',monospace;font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;padding:.15rem .4rem;border-radius:2px;display:inline-block;margin-bottom:.4rem}
.tag-tech{background:#dde8f0;color:#1a2640}.tag-ai{background:#e8ddf0;color:#4a1a64}.tag-property{background:#ddf0e4;color:#1a4a2a}.tag-skills{background:#f0eddd;color:#5c4a1a}.tag-tasks{background:#f0dddd;color:#641a1a}.tag-accounts{background:#ddf0f0;color:#1a4a4a}.tag-personal{background:#f0dde8;color:#641a4a}
.card-title{font-weight:500;font-size:.85rem;line-height:1.35;margin-bottom:.3rem}
.card-meta{font-family:'Space Mono',monospace;font-size:.6rem;color:var(--mist);line-height:1.4}
@keyframes slideIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
footer{background:var(--navy);color:var(--mist);padding:2rem;text-align:center;margin-top:3rem}
footer .pct{font-family:'Playfair Display',serif;font-size:2.5rem;font-weight:900;color:#6ec6a0}
footer p{font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.06em;text-transform:uppercase;margin-top:.3rem}
</style>
</head>

const colMap={done:'col-done',progress:'col-prog',todo:'col-todo',blocked:'col-blocked'};
let activeFilter='all';
function render(){
  const filtered=activeFilter==='all'?tasks:tasks.filter(t=>t.tag===activeFilter);
  Object.values(colMap).forEach(id=>document.getElementById(id).innerHTML='');
  const counts={done:0,progress:0,todo:0,blocked:0};
  filtered.forEach((t,i)=>{counts[t.col]++;const el=document.getElementById(colMap[t.col]);const card=document.createElement('div');card.className=`card ${t.col}`;card.style.animationDelay=`${i*30}ms`;card.innerHTML=`<div class="card-tag ${tagColors[t.tag]}">${t.tagLabel}</div><div class="card-title">${t.title}</div><div class="card-meta">${t.meta}</div>`;el.appendChild(card);});
  document.getElementById('s-done').textContent=counts.done;document.getElementById('s-prog').textContent=counts.progress;document.getElementById('s-todo').textContent=counts.todo;document.getElementById('s-blocked').textContent=counts.blocked;

}
function initFilters(){

}
initFilters();render();
